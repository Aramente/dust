<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dust — Candidate Tour</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif}
.bounce1{animation:bounce 1s infinite}
.bounce2{animation:bounce 1s infinite .15s}
.bounce3{animation:bounce 1s infinite .3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.msg-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#messages{scroll-behavior:smooth}
</style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-white border-b border-slate-100 px-4 py-3 flex items-center gap-3 shrink-0">
  <div class="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </div>
  <div class="flex-1">
    <div class="flex items-center gap-2">
      <span class="font-bold text-sm text-slate-900">dust — Candidate Tour</span>
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full inline-block"></span>
      <span class="text-xs text-slate-400">Alex is online</span>
    </div>
    <div class="flex items-center gap-1 mt-1" id="progress-bar"></div>
  </div>
</div>

<!-- MESSAGES -->
<div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4"></div>

<!-- INPUT -->
<div class="bg-white border-t border-slate-100 px-4 py-3 shrink-0">
  <div class="flex items-center gap-2">
    <input id="user-input" type="text" placeholder="Ask anything about Dust..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 outline-none focus:border-slate-400 transition-colors" />
    <button id="send-btn" onclick="sendMessage()" class="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center hover:bg-slate-700 transition-colors shrink-0">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <p class="text-xs text-slate-400 text-center mt-2">Ask about roles, culture, compensation, tech stack, interview process…</p>
</div>

<script>
// ── KNOWLEDGE BASE ──
const KB = [
  {keys:["mission","why","purpose","goal","vision","exist","built","founded","create"],
   ans:"Dust was founded in 2022 with one conviction: **AI should be a team sport, not a solo tool.**\n\nMost companies hand every employee a standalone chatbot and wonder why adoption stays low. Dust is different — it's the platform where AI agents are built once and shared across an entire organization. The best thinking of your top engineer becomes infrastructure for everyone.\n\nToday, 5,000+ organizations use Dust. 80,000+ custom agents are in production."},
  {keys:["founder","ceo","stan","stanislas","gabriel","started","leadership"],
   ans:"Dust was co-founded by **Stanislas Polu** and **Gabriel Hubert**. Stan was a Research Scientist at OpenAI — he worked on some of the most advanced reasoning models before leaving to start Dust. Gabriel was previously at Stripe and Front, and brings deep product and GTM experience.\n\nThey're hands-on, in the office daily, and you'd work directly with them."},
  {keys:["team","people","colleagues","employee","headcount","size","how many","background"],
   ans:"We're a **~40 person team** split between Paris and San Francisco. Alumni from Stripe, OpenAI, Front, and Stanford — people who've built things at scale and chose to come here to do it again.\n\nSmall enough that everyone has massive scope, large enough to have real depth. You'll collaborate directly with the founders from day one."},
  {keys:["culture","values","principles","vibe","environment","atmosphere","work style","mindset"],
   ans:"A few things define how we work:\n\n**Product-First** — every decision starts from the user.\n**Ship to Learn** — we move fast and treat every release as a learning opportunity.\n**Intellectual Humility** — we debate hard, but change our minds when shown better evidence. Low ego, high standards.\n**Dust on Dust** — we run our own product internally. If we build something, we're the first users. No exceptions.\n**Proactive Problem-Solving** — we don't wait to be asked. If you see something broken, you fix it."},
  {keys:["product","what do you","what does dust","how does it work","what you build","agents","platform"],
   ans:"Dust is a platform for building and running **custom AI agents** connected to a company's internal knowledge. You connect your data — Slack, Notion, GitHub, Google Drive, Salesforce — and build agents that actually know your business. Then you publish them to a company-wide marketplace.\n\nOne great agent built by an engineer benefits every non-technical colleague. 5,000+ organizations use Dust. 12 million conversations happened on the platform in 2025 alone."},
  {keys:["customer","traction","growth","adoption","success","results","impact","clients"],
   ans:"The numbers are real:\n\n• **Persona** — 80% employee adoption across 13 departments, 300+ agents\n• **Vanta** — 400 hours/week saved on QBR prep\n• **Clay** — 100% GTM team adoption, 58 hours/month saved\n• **Watershed** — 20% to 90% company-wide adoption in months\n• **Back Market** — AI fraud system built in 1 week → €1.2M savings\n\nTeams reach 70–90%+ adoption not because it was mandated, but because the product delivers real value from day one."},
  {keys:["funding","raise","investors","sequoia","money","valuation","series","investment","backed"],
   ans:"Dust raised a **\$16M round backed by Sequoia** — one of the most respected names in venture. We were also named **Future 50** by The Generalist, recognizing us as one of the most promising AI infrastructure companies.\n\nWe're well-funded and focused on building the right product, not chasing the next round."},
  {keys:["where","location","office","paris","san francisco","remote","onsite","hybrid","city"],
   ans:"We're **in-person first** with offices in **Paris** (HQ) and **San Francisco**. Most of the team is in Paris.\n\nWe offer up to **€10,000 in relocation support** plus help finding an apartment. Engineering roles travel to the US multiple times a year."},
  {keys:["salary","compensation","pay","wage","money","earn","how much","package","comp"],
   ans:"We pay competitively and adjust proactively — **Netflix-style**: reviews happen whenever warranted, not just once a year.\n\nCurrent salary bands:\n• Software Engineer: **€40K–€150K**\n• Software Engineer, Frontend: **€60K–€150K**\n• Product Data Analyst: **€70K–€110K**\n\nAll roles include **significant equity** (Sequoia-backed, real upside)."},
  {keys:["equity","stock","options","ownership","shares"],
   ans:"Equity is a real part of the package at Dust — not a token gesture. We're **Sequoia-backed**, growing fast, and the upside is meaningful. We don't use equity as a substitute for salary. Both are competitive."},
  {keys:["perk","benefit","health","insurance","equipment","laptop","gym","lunch","advantage"],
   ans:"Beyond salary + equity:\n\n✓ Health insurance for you and dependents\n✓ MacBook Pro or Linux + full equipment setup\n✓ €10,000 relocation support + apartment search\n✓ Beautiful Paris office — not a co-working space\n✓ Travel to the US multiple times a year\n✓ Regular team events and offsites\n✓ Netflix-style comp reviews — anytime, not calendar-driven\n✓ Work on a product you use every single day"},
  {keys:["role","position","job","opening","hiring","apply","vacancy","join as","work as"],
   ans:"We're currently hiring for 4 roles:\n\n🔵 **Software Engineer** (Paris, €40K–€150K + equity)\nTypeScript, Rust, React, Node.js, Kubernetes, PostgreSQL\n\n🔵 **Software Engineer, Frontend** (Paris, €60K–€150K + equity)\nReact, shadcn, TypeScript, Next.js — own the UX end-to-end\n\n🟣 **Product Data Analyst** (Paris, €70K–€110K + equity)\nFirst data analyst at Dust — define what success looks like\n\n🟡 **Opportunistic Role – AI Builder** (Paris or SF)\nBuilder mindset, excited about AI — we want to hear from you\n\nApply at: jobs.ashbyhq.com/dust"},
  {keys:["tech","stack","typescript","rust","kubernetes","postgres","infrastructure","backend","frontend","code","developer"],
   ans:"The stack is modern and intentional:\n\n• **TypeScript** everywhere (frontend + backend)\n• **Rust** for performance-critical components\n• **React + Next.js** for the product\n• **Kubernetes + Helm + Terraform** for infra\n• **PostgreSQL + QDrant + Elasticsearch** for data\n\nEngineers own features end-to-end. The codebase is **open source** at github.com/dust-tt/dust — explore before you apply."},
  {keys:["interview","process","hiring process","how to apply","steps","assessment","test","expect"],
   ans:"Our process is thorough but respectful of your time:\n\n1. **Intro call** with a recruiter — 30 min, low pressure\n2. **Technical or domain interview** — role-specific\n3. **Work session** — a realistic, paid exercise\n4. **Team interviews** — meet the people you'd work with\n5. **Founders chat** — Stan and Gabriel are involved in every hire\n\nWe move quickly and give real feedback at every stage. Start at jobs.ashbyhq.com/dust."},
  {keys:["grow","career","progression","learning","development","opportunity","future","promoted","level"],
   ans:"Dust is small enough that **your scope is whatever you're ready to take on**. No waiting in line for responsibility. Engineers who join today are shaping the architecture of a product used by 5,000+ organizations.\n\nAs we grow, the people who helped build it will naturally grow into larger roles. We invest in people proactively — not just during annual reviews."},
  {keys:["ai","artificial intelligence","llm","gpt","claude","model","openai","future","technology"],
   ans:"We're at an inflection point. In 2025, general AI agents went from 16% to 40%+ of all Dust conversations. Models have outgrown the need for rigid scaffolding — and we've been getting out of their way at every step.\n\nWorking at Dust means being at the center of that shift — not observing it from the outside."},
  {keys:["day","typical","daily","week","life","routine"],
   ans:"A typical day: start by checking your team's Slack — we move fast and there's usually something interesting in the pipeline. Then deep work: building, reviewing, shipping. Lunch is often with the team. Afternoons can involve a product review with the founders or a quick sync with a customer.\n\nWe keep meetings light and focus on async by default. You're in a Paris office with smart, motivated people — it's energizing."},
];

// ── TOUR STEPS ──
const TOUR = [
  {msg:"Hey there! 👋 I'm **Alex**, your guide for today.\n\nI'll take you on a tour of **Dust** — who we are, what we build, the team, the culture, and the open roles. You can ask me anything along the way.\n\nReady to explore?",
   chips:["Yes, let's go!","What is Dust exactly?","Tell me about the team"]},
  {msg:"Dust was founded in 2022 with one conviction: **AI should be a team sport, not a solo tool.**\n\nMost companies hand every employee a standalone chatbot and wonder why adoption stays low. Dust is different — it's the platform where AI agents are built once and shared across an entire organization. The best thinking of your top engineer becomes infrastructure for everyone.\n\nToday, 5,000+ organizations use Dust. 80,000+ custom agents are in production.",
   chips:["How does the product work?","Who are the founders?","What's the culture like?"]},
  {msg:"Think of Dust as the **OS for how a company works with AI**.\n\nYou connect your data — Slack, Notion, GitHub, Google Drive, Salesforce — and build custom agents that actually know your business. Then you publish them to a company-wide marketplace.\n\nOne great agent built by an engineer can benefit every non-technical colleague. Results are real:\n\n• Vanta saves **400 hours/week** on QBR prep\n• Clay reached **100% adoption** in 24 hours\n• Back Market built a fraud detection system in **1 week** → €1.2M savings",
   chips:["Tell me about the team","What's the culture like?","What roles are open?"]},
  {msg:"A few things define how we work:\n\n**Product-First** — every decision starts from the user.\n**Ship to Learn** — move fast, treat every release as learning.\n**Intellectual Humility** — we debate hard but change our minds when shown better evidence.\n**Dust on Dust** — we run our own product internally. No exceptions.\n\nThe team is ~40 people, alumni from Stripe, OpenAI, Front, and Stanford. In-person in Paris and San Francisco. The founders — Stan (ex-OpenAI) and Gabriel (ex-Stripe) — are in the office every day.",
   chips:["What roles are open?","What's the compensation?","How do I apply?"]},
  {msg:"We're currently hiring for 4 roles:\n\n🔵 **Software Engineer** — Paris · €40K–€150K + equity\nTypeScript, Rust, React, Kubernetes, PostgreSQL\n\n🔵 **Software Engineer, Frontend** — Paris · €60K–€150K + equity\nReact, shadcn, TypeScript — own the UX end-to-end\n\n🟣 **Product Data Analyst** — Paris · €70K–€110K + equity\nFirst data analyst at Dust — you define what success looks like\n\n🟡 **AI Builder (Open Role)** — Paris or SF\nBuilder mindset, excited about AI — we want to hear from you",
   chips:["What are the perks?","How does the interview work?","How do I apply?"]},
  {msg:"That's the tour! 🎉\n\nThe short version: Dust is a **small, exceptional team** building the infrastructure layer for how companies work with AI — at a moment when that shift is happening in real time.\n\nIf any of this resonates, head to **jobs.ashbyhq.com/dust** to apply. I'm still here if you have questions.",
   chips:["How do I apply?","Tell me about compensation","What's a typical day like?"]},
];

const PROGRESS_LABELS = ["Welcome","Mission","Product","Culture & Team","Open Roles","Wrap-up"];
let tourStep = 0;
let tourDone = false;
let isTyping = false;

function updateProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = PROGRESS_LABELS.map((l,i) => {
    const dot = i < tourStep ? '<span class="text-green-600 text-xs font-medium">✓</span>'
      : i === tourStep ? '<span class="text-slate-900 text-xs font-medium">'+(i+1)+'</span>'
      : '<span class="text-slate-300 text-xs font-medium">'+(i+1)+'</span>';
    const line = i < PROGRESS_LABELS.length-1 ? '<div class="w-4 h-px '+(i<tourStep?'bg-green-400':'bg-slate-200')+'"></div>' : '';
    return dot + line;
  }).join('') + '<span class="text-xs text-slate-400 ml-1">' + PROGRESS_LABELS[Math.min(tourStep, PROGRESS_LABELS.length-1)] + '</span>';
}

function parseText(text) {
  return text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').split('\n').map(l => '<p class="'+(l===''?'mt-2':'mt-1 first:mt-0')+'">' + l + '</p>').join('');
}

function addMessage(role, text, chips) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-in';
  if (role === 'guide') {
    wrap.innerHTML = `<div class="flex items-start gap-2.5 max-w-xl">
      <div class="w-7 h-7 bg-slate-900 rounded-full flex items-center justify-center shrink-0 mt-0.5"><span class="text-white text-xs font-bold">A</span></div>
      <div>
        <div class="bg-white border border-slate-100 rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-slate-700 leading-relaxed shadow-sm">${parseText(text)}</div>
        ${chips ? '<div class="flex flex-wrap gap-2 mt-2">' + chips.map(c => '<button onclick="handleChip(\'' + c.replace(/'/g,"\\'") + '\')" class="text-xs font-medium bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-full hover:border-slate-900 hover:text-slate-900 transition-all">' + c + '</button>').join('') + '</div>' : ''}
      </div>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="flex justify-end"><div class="bg-slate-900 text-white text-sm px-4 py-2.5 rounded-2xl rounded-tr-sm max-w-xs">${text}</div></div>`;
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const t = document.createElement('div');
  t.id = 'typing';
  t.className = 'msg-in flex items-start gap-2.5';
  t.innerHTML = `<div class="w-7 h-7 bg-slate-900 rounded-full flex items-center justify-center shrink-0"><span class="text-white text-xs font-bold">A</span></div><div class="bg-white border border-slate-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm"><div class="flex gap-1 items-center h-4"><span class="w-1.5 h-1.5 bg-slate-400 rounded-full bounce1 inline-block"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full bounce2 inline-block"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full bounce3 inline-block"></span></div></div>`;
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function guideReply(text, chips, delay) {
  isTyping = true;
  showTyping();
  setTimeout(() => {
    hideTyping();
    isTyping = false;
    addMessage('guide', text, chips);
    updateProgress();
  }, delay || 900);
}

function getKBAnswer(input) {
  const q = input.toLowerCase();
  for (const entry of KB) {
    if (entry.keys.some(k => q.includes(k))) return entry.ans;
  }
  if (/hi|hello|hey|good/.test(q)) return "Hey! Great to meet you 😊 Feel free to ask me anything about Dust — the company, the team, the roles, compensation, culture... I'm here for all of it.";
  if (/thank/.test(q)) return "Of course! It's what I'm here for. Anything else you'd like to know about Dust?";
  return "Great question. To give you the best answer, I'd suggest bringing it up directly during your intro call with the team. You can start the process at **jobs.ashbyhq.com/dust**. Anything else I can help with?";
}

function advanceTour() {
  const next = tourStep + 1;
  if (next < TOUR.length) {
    tourStep = next;
    if (next === TOUR.length - 1) tourDone = true;
    guideReply(TOUR[next].msg, TOUR[next].chips, 600);
  }
}

function handleChip(chip) {
  addMessage('user', chip, null);
  if (chip === "Yes, let's go!") { tourStep = 1; guideReply(TOUR[1].msg, TOUR[1].chips); return; }
  if (chip === "How does the product work?") { tourStep = 2; guideReply(TOUR[2].msg, TOUR[2].chips); return; }
  if (chip === "Tell me about the team" || chip === "What's the culture like?") { tourStep = 3; guideReply(TOUR[3].msg, TOUR[3].chips); return; }
  if (chip === "What roles are open?") { tourStep = 4; guideReply(TOUR[4].msg, TOUR[4].chips); return; }
  if (chip === "Continue the tour →") { advanceTour(); return; }
  if (chip === "How do I apply?") {
    if (!tourDone) { tourDone = true; tourStep = 5; guideReply(TOUR[5].msg, TOUR[5].chips); }
    setTimeout(() => guideReply("Head to **jobs.ashbyhq.com/dust** to apply. The process starts with a 30-min intro call — low pressure, just getting to know each other. We move fast and give real feedback at every step.", null, 900), 200);
    return;
  }
  const ans = getKBAnswer(chip);
  const chips = !tourDone ? ["Continue the tour →","I have another question"] : ["How do I apply?","Tell me more"];
  guideReply(ans, chips);
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const q = input.value.trim();
  if (!q || isTyping) return;
  input.value = '';
  addMessage('user', q, null);
  if (/continue|next/.test(q.toLowerCase())) { advanceTour(); return; }
  const ans = getKBAnswer(q);
  const chips = !tourDone ? ["Continue the tour →","I have another question"] : ["How do I apply?","Tell me more"];
  guideReply(ans, chips);
}

document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// Init
updateProgress();
addMessage('guide', TOUR[0].msg, TOUR[0].chips);
</script>
</body>
</html>
