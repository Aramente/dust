a{color:inherit;text-decoration:none}button{cursor:pointer}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.tw{max-width:1100px;margin:0 auto;padding:38px 40px}
.dot{height:8px;border-radius:9999px;border:none;cursor:pointer;padding:0;transition:all .2s}
.dot.on{width:24px;background:var(--track)}.dot.off{width:8px;background:#E2E8F0}.dot.off:hover{background:#CBD5E1}

      +'<div style="background:#0F172A;border-radius:12px;padding:15px"><img src="https://avatars.githubusercontent.com/u/15067" width="42" height="42" style="border-radius:9px;margin-bottom:9px"><div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:2px">Stanislas Polu</div><div style="font-size:11px;color:#475569;margin-bottom:7px">Co-founder, CTO</div><div style="font-size:11px;color:#475569;margin-bottom:2px">· OpenAI Research Scientist</div><div style="font-size:11px;color:#475569;margin-bottom:7px">· GPT-3 &amp; RLHF research</div><div style="font-size:11px;color:#94A3B8;font-style:italic;border-top:1px solid #1E293B;padding-top:8px">"Left OpenAI to fix the team AI problem."</div></div>'
      +'<div style="background:#F8FAFC;border:1px solid #F1F5F9;border-radius:12px;padding:15px"><img src="https://avatars.githubusercontent.com/u/998689" width="42" height="42" style="border-radius:9px;margin-bottom:9px"><div style="font-size:12px;font-weight:700;color:#0F172A;margin-bottom:2px">Gabriel Hubert</div><div style="font-size:11px;color:#64748B;margin-bottom:7px">Co-founder, CEO</div><div style="font-size:11px;color:#94A3B8;margin-bottom:2px">· Co-founder, Front</div><div style="font-size:11px;color:#94A3B8;margin-bottom:7px">· ex-Stripe</div><div style="font-size:11px;color:#94A3B8;font-style:italic;border-top:1px solid #E2E8F0;padding-top:8px">"Built products at scale before founding Dust."</div></div>'
    +'</div>'
    +'<div style="background:#fff;border:1px solid #F1F5F9;border-radius:12px;padding:13px;margin-bottom:14px"><div class="lbl">The full team — '+TEAM.length+' people</div><div style="display:grid;grid-template-columns:repeat(8,1fr);gap:10px">'+grid+'</div></div>'

/* ── S7: CHATBOT ── */
function dustStorage(k,v){try{if(v===undefined)return localStorage.getItem(k);if(v===null)localStorage.removeItem(k);else localStorage.setItem(k,v);}catch(e){return null;}}
function dustSessionToken(){
  var t=dustStorage('dust_session');
  if(!t){
    t=(crypto&&crypto.randomUUID)?crypto.randomUUID():('s_'+Math.random().toString(36).slice(2)+Date.now().toString(36));
    dustStorage('dust_session',t);
  }
  return t;
}
var convId=dustStorage('dust_conv')||null;
var TURNSTILE_SITEKEY="0x4AAAAAADKXkI0Mnf03LWMS";
var turnstileWidgetId=null;
var turnstileToken=null;
var turnstileResolve=null;
function settleTurnstile(t){turnstileToken=t;if(turnstileResolve){var r=turnstileResolve;turnstileResolve=null;r(t);}}
function ensureTurnstile(){
  if(!TURNSTILE_SITEKEY)return;
  if(window.__tsLoaded)return;
  window.__tsLoaded=true;
  var s=document.createElement('script');
  s.src='https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileReady';
  s.async=true;s.defer=true;document.head.appendChild(s);
}
window.onTurnstileReady=function(){
  var host=document.getElementById('ts-host');if(!host||!TURNSTILE_SITEKEY)return;
  turnstileWidgetId=window.turnstile.render(host,{
    sitekey:TURNSTILE_SITEKEY,
    size:'flexible',
    appearance:'interaction-only',
    callback:function(t){settleTurnstile(t);},
    'error-callback':function(){settleTurnstile(null);},
    'expired-callback':function(){settleTurnstile(null);},
    'timeout-callback':function(){settleTurnstile(null);}
  });
};
async function getTurnstileToken(){
  if(!TURNSTILE_SITEKEY||!window.turnstile||turnstileWidgetId==null)return null;
  if(turnstileToken){
    var t=turnstileToken;turnstileToken=null;
    try{window.turnstile.reset(turnstileWidgetId);}catch(e){}
    return t;
  }
  return new Promise(function(resolve){
    turnstileResolve=resolve;
    setTimeout(function(){settleTurnstile(null);},15000);
  });
}
function initChat(){convId=null;}
function s7(){
  var sugg=['How is comp decided?','What does a day look like here?','How does the product work?','Who are the founders?','What\'s the hiring process?'];
  return '<div style=";display:flex;flex-direction:column" style="height:calc(100vh - 100px)"><div class="lbl">Ask Dust anything</div>'
    +'<h2 class="h2">Your questions. A real Dust agent.</h2>'
    +'<p class="desc" style="margin-bottom:14px">This agent has the full Dust website, blog, job board and team page as its knowledge base. Ask anything.</p>'
    +'<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:300px;margin-bottom:10px">'
      +'<div id="chat-msgs" class="sp" style="flex:1;max-height:320px"><div id="chat-inner" style="padding:14px;display:flex;flex-direction:column;gap:9px">'
        +'<div style="text-align:center"><span style="font-size:10px;color:#94A3B8;background:#F8FAFC;border:1px solid #E2E8F0;padding:3px 10px;border-radius:9999px">@dust-candidate · Ready</span></div>'
        +'<div style="display:flex;gap:8px;align-items:flex-start"><div style="width:22px;height:22px;background:#7C3AED;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:9px;font-weight:700">D</span></div><div class="cb ab">Hi! I\'m your Dust recruiting guide. Ask me anything about the product, culture, comp, the team, or open roles.</div></div>'
      +'</div></div>'
      +'<div style="border-top:1px solid #E2E8F0;padding:9px 11px;display:flex;gap:7px;background:#fff"><input id="chat-in" type="text" placeholder="Ask about culture, comp, roles, how the product works..." style="flex:1;border:1px solid #E2E8F0;border-radius:8px;padding:8px 10px;font-size:12px;font-family:Inter,sans-serif;outline:none;color:#0F172A" onkeydown="if(event.key===\'Enter\')sendChat()"><button onclick="sendChat()" id="chat-btn" style="background:#0F172A;color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:12px;font-weight:700">Send</button></div>'
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px">'+sugg.map(function(q){return '<button onclick="setSugg(\''+q+'\')" style="font-size:11px;background:#fff;border:1px solid #E2E8F0;color:#475569;padding:5px 10px;border-radius:7px;cursor:pointer;font-weight:500">'+q+'</button>';}).join('')+'</div>'
    +'</div>';
}
function setSugg(q){var i=document.getElementById('chat-in');if(i){i.value=q;sendChat();}}
function addBubble(txt,role){
  var wrap=document.getElementById('chat-inner');if(!wrap)return;
  var div=document.createElement('div');div.style.display='flex';div.style.gap='8px';div.style.alignItems='flex-start';
  var bubble=document.createElement('div');
  if(role==='user'){
    div.style.justifyContent='flex-end';
    bubble.className='cb ub';bubble.textContent=txt;
    div.appendChild(bubble);
  } else {
    var avatar=document.createElement('div');
    avatar.style.cssText='width:22px;height:22px;background:#7C3AED;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center';
    var letter=document.createElement('span');
    letter.style.cssText='color:#fff;font-size:9px;font-weight:700';letter.textContent='D';
    avatar.appendChild(letter);
    bubble.className='cb ab';bubble.textContent=txt;
    div.appendChild(avatar);div.appendChild(bubble);
  }
  wrap.appendChild(div);
  var m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight;
  return bubble;
}
var chatInFlight=false;
async function sendChat(){
  if(chatInFlight)return;
  var inp=document.getElementById('chat-in');if(!inp||!inp.value.trim())return;
  var txt=inp.value.trim();inp.value='';
  chatInFlight=true;
  var btn=document.getElementById('chat-btn');if(btn)btn.disabled=true;
  if(inp)inp.disabled=true;
  addBubble(txt,'user');
  var loadEl=addBubble('...','ai');
  var gotMessage=false;
  try{
    var url='https://dust-proxy.kevin-duchier.workers.dev/';
    var tsToken=await getTurnstileToken();
    var body={message:txt,conversationId:convId||null,sessionToken:dustSessionToken(),turnstileToken:tsToken};
    var resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var reader=resp.body.getReader(),dec=new TextDecoder(),buf='',txt2='';
    while(true){
      var _r=await reader.read();if(_r.done)break;
      buf+=dec.decode(_r.value,{stream:true});
      var lines=buf.split('\n');buf=lines.pop();
      for(var j=0;j<lines.length;j++){
        var ln=lines[j];
        if(ln.startsWith('data: ')){
          try{
            var ev=JSON.parse(ln.slice(6));
            if(ev.type==='conversation_created'&&ev.conversation){convId=ev.conversation.sId;dustStorage('dust_conv',convId);continue;}
            var d=ev.data;
            if(!d||!d.type)continue;
            if(d.type==='generation_tokens'&&typeof d.text==='string'){txt2+=d.text;if(loadEl)loadEl.textContent=txt2;}
            else if((d.type==='agent_message_success'||d.type==='agent_message_done')&&d.message&&d.message.content){txt2=d.message.content;gotMessage=true;if(loadEl)loadEl.textContent=txt2;}
            else if(d.type==='agent_error'&&d.error&&d.error.message){if(loadEl)loadEl.textContent='Agent error: '+d.error.message;gotMessage=true;}
          }catch(e){}
        }
      }
    }
    if(!gotMessage&&loadEl)loadEl.textContent=txt2?(txt2+' …connection lost'):'No response received — please try again.';
  }catch(e){if(loadEl)loadEl.textContent='Could not reach the agent. Please try again in a moment.';}
  finally{
    chatInFlight=false;
    if(btn)btn.disabled=false;
    if(inp)inp.disabled=false;
  }
}
ensureTurnstile();
