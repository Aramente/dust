<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dust — Join the crew</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{font-family:'Inter',sans-serif}
  .fade{animation:fi .3s ease}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .dot-active{width:20px;height:6px;background:#0F172A;border-radius:9999px}
  .dot-inactive{width:6px;height:6px;background:#CBD5E1;border-radius:9999px}
  .dot-inactive:hover{background:#94A3B8}
  pre code span{line-height:1.6}
</style>
</head>
<body style="background:#fff;height:100vh;overflow:hidden">

<!-- ONBOARDING -->
<div id="onboarding" style="height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#fff">
  <div style="max-width:420px;width:100%" id="ob-inner"></div>
</div>

<!-- TOUR -->
<div id="tour" style="display:none;height:100vh;flex-direction:column" class="flex">

  <!-- HEADER -->
  <div style="border-bottom:1px solid #F1F5F9;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:8px">
      <img src="https://dust.tt/favicon.ico" width="18" height="18" alt="Dust" style="border-radius:4px">
      <span style="font-weight:800;font-size:15px;letter-spacing:-0.02em;color:#0F172A">dust</span>
      <span style="color:#E2E8F0;margin:0 2px">·</span>
      <span style="font-size:11px;color:#94A3B8;font-weight:500">Join the crew</span>
    </div>
    <div id="section-tabs" style="display:flex;align-items:center;gap:4px;margin-left:auto"></div>
  </div>

  <!-- BODY -->
  <div style="flex:1;display:flex;overflow:hidden">

    <!-- LEFT PANEL -->
    <div style="width:280px;border-right:1px solid #F1F5F9;display:flex;flex-direction:column;flex-shrink:0;background:#FAFAFA">
      <div style="flex:1;padding:24px;display:flex;flex-direction:column;justify-content:space-between">
        <div>
          <!-- Alex -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
            <div style="width:32px;height:32px;background:#0F172A;border-radius:50%;display:flex;align-items:center;justify-content:center">
              <span style="color:#fff;font-size:11px;font-weight:700">A</span>
            </div>
            <div>
              <div style="font-size:12px;font-weight:600;color:#0F172A">Alex</div>
              <div style="font-size:11px;color:#94A3B8">Dust · Recruiting Guide</div>
            </div>
            <span style="margin-left:auto;width:6px;height:6px;background:#10B981;border-radius:50%"></span>
          </div>
          <div id="left-caption"></div>
        </div>
        <div>
          <div id="section-dots" style="display:flex;align-items:center;gap:6px;margin-bottom:20px"></div>
          <div style="display:flex;gap:8px">
            <button id="btn-prev" onclick="prev()" style="flex:1;border:1px solid #E2E8F0;color:#475569;font-size:11px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer;background:#fff;transition:all .15s">&#8592; Back</button>
            <button id="btn-next" onclick="next()" style="flex:1;background:#0F172A;color:#fff;font-size:11px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer;border:none;transition:all .15s">Next &#8594;</button>
          </div>
          <div style="margin-top:10px;text-align:center">
            <button onclick="goTo(5)" style="font-size:11px;color:#94A3B8;background:none;border:none;cursor:pointer">Skip to match assessment</button>
          </div>
        </div>
      </div>
      <div style="border-top:1px solid #E2E8F0;padding:10px 16px;display:flex;align-items:center;gap:6px">
        <span style="width:5px;height:5px;background:#10B981;border-radius:50%"></span>
        <span style="font-size:11px;color:#94A3B8">Tailored for </span>
        <span id="profile-tag" style="font-size:11px;font-weight:600;color:#475569"></span>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel" style="flex:1;overflow-y:auto"></div>
  </div>
</div>

<script>
var profile={background:'',priority:''};
var section=0;
var activeSources=["Notion","Slack","GitHub"];

var BG=[
  {id:"builder",label:"I build products & systems",sub:"Engineering, dev, technical roles"},
  {id:"data",label:"I work with data & insights",sub:"Analytics, data science, BI, research"},
  {id:"product",label:"I shape what gets built",sub:"Product, design, strategy, UX"},
  {id:"business",label:"I grow or operate businesses",sub:"Sales, marketing, ops, GTM, HR, recruitment"}
];
var PRI=[
  {id:"ownership",label:"Autonomy & ownership",sub:"I want to own things end-to-end"},
  {id:"team",label:"Team & culture",sub:"The people I work with matter most"},
  {id:"technical",label:"Technical challenge",sub:"I want hard problems"},
  {id:"impact",label:"Impact & mission",sub:"I want to see real-world results"}
];
var SECTIONS=["Mission","Product","In the Wild","Team","Roles","Match"];

// ── ONBOARDING ──
function renderOnboarding(step){
  var items=step===0?BG:PRI;
  var logo='<div style="display:flex;align-items:center;gap:8px;margin-bottom:40px"><img src="https://dust.tt/favicon.ico" width="22" height="22" style="border-radius:5px"><span style="font-weight:800;font-size:18px;letter-spacing:-0.03em;color:#0F172A">dust</span></div>';
  var hdr=step===0
    ?'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Before we start — 1 of 2</div><h1 style="font-size:22px;font-weight:800;color:#0F172A;margin-bottom:8px;letter-spacing:-0.02em">What best describes your background?</h1><p style="font-size:13px;color:#64748B;margin-bottom:24px;line-height:1.5">Your answer shapes everything that follows.</p>'
    :'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Question 2 of 2</div><h1 style="font-size:22px;font-weight:800;color:#0F172A;margin-bottom:8px;letter-spacing:-0.02em">What matters most in your next role?</h1><p style="font-size:13px;color:#64748B;margin-bottom:24px;line-height:1.5">No right answer — this shapes how I frame things.</p>';
  var btns=items.map(function(o){
    var fn=step===0?"selectBg('"+o.id+"')" :"selectPri('"+o.id+"')";
    return '<button onclick="'+fn+'" style="width:100%;text-align:left;border:1px solid #E2E8F0;border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;background:#fff;transition:all .15s" onmouseover="this.style.borderColor=\'#0F172A\';this.style.background=\'#F8FAFC\'" onmouseout="this.style.borderColor=\'#E2E8F0\';this.style.background=\'#fff\'"><div style="font-size:13px;font-weight:600;color:#0F172A">'+o.label+'</div><div style="font-size:11px;color:#94A3B8;margin-top:2px">'+o.sub+'</div></button>';
  }).join('');
  document.getElementById('ob-inner').innerHTML=logo+hdr+btns;
}

function selectBg(id){profile.background=id;renderOnboarding(1);}
function selectPri(id){
  profile.priority=id;
  document.getElementById('onboarding').style.display='none';
  var t=document.getElementById('tour');t.style.display='flex';t.style.flexDirection='column';
  initTour();
}

// ── CAPTIONS ──
function getCaption(i){
  var bg=profile.background,pri=profile.priority;
  return [
    {title:"One belief changed everything.",sub:bg==='business'?"AI compounds when shared across a whole company — not siloed in individual tools.":pri==='impact'?"AI compounds when shared — not siloed in individual chatbots.":"AI only works as team infrastructure. That's the insight Dust was built on."},
    {title:bg==='business'||bg==='product'?"No code. No prompts. Real results.":"See it to believe it.",sub:bg==='business'?"Anyone in your company can use agents built by one person. Here's how it works.":bg==='product'?"Here's the Dust interface — a PM's dream: ship agents like features.":"Here's what building and deploying an agent actually looks like."},
    {title:pri==='technical'?"Shipped in the morning. In production by noon.":bg==='business'?"This is what a high-trust, high-output team looks like.":"Culture isn't written. It's lived.",sub:bg==='business'?"A real glimpse at how Dust operates internally — using its own product every day.":pri==='team'?"A real glimpse at how the team moves day-to-day.":"A real day inside the Dust engineering team."},
    {title:"~40 people. Exceptional backgrounds.",sub:bg==='business'?"Founders from OpenAI and Stripe. People who've built and scaled before.":pri==='ownership'?"Small enough that everyone owns something real from day one.":"You'd work directly with these people, including the founders."},
    {title:bg==='business'?"26 open roles. Multiple paths in.":"Based on your background...",sub:bg==='business'||bg==='product'?"Dust hires for mindset as much as background. Multiple roles fit non-technical profiles.":"Here's where you'd likely land. The top card is personalized for you."},
    {title:"Let's find out if you're a fit.",sub:bg==='business'?"Describe your background and I'll point you to the right role — honestly.":"Paste your background or pick a quick option. I'll give you an honest read."}
  ][i];
}

// ── TOUR INIT ──
function initTour(){
  document.getElementById('section-tabs').innerHTML=SECTIONS.map(function(s,i){
    return '<button onclick="goTo('+i+')" id="tab-'+i+'" style="font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;cursor:pointer;border:none;transition:all .15s;color:#94A3B8;background:transparent">'+s+'</button>';
  }).join('');
  var bg=BG.find(function(b){return b.id===profile.background;});
  document.getElementById('profile-tag').textContent=bg?bg.label.replace('I build','building').replace('I work','working').replace('I shape','shaping').replace('I grow','growing'):'';
  goTo(0);
}

function goTo(i){
  section=i;
  var cap=getCaption(i);
  document.getElementById('section-dots').innerHTML=SECTIONS.map(function(_,j){
    return '<button onclick="goTo('+j+')" class="'+(j===i?'dot-active':'dot-inactive')+'" style="transition:all .2s;border:none;cursor:pointer;padding:0"></button>';
  }).join('');
  document.getElementById('left-caption').innerHTML='<div class="fade"><h3 style="font-size:16px;font-weight:800;color:#0F172A;line-height:1.3;margin-bottom:8px;letter-spacing:-0.01em">'+cap.title+'</h3><p style="font-size:12px;color:#64748B;line-height:1.5">'+cap.sub+'</p></div>';
  SECTIONS.forEach(function(_,j){
    var tab=document.getElementById('tab-'+j);
    if(tab){tab.style.background=j===i?'#0F172A':'transparent';tab.style.color=j===i?'#fff':'#94A3B8';}
  });
  document.getElementById('btn-prev').style.opacity=i===0?'0.3':'1';
  document.getElementById('btn-next').style.opacity=i===SECTIONS.length-1?'0.3':'1';
  var fns=[renderMission,renderProduct,renderWild,renderTeam,renderRoles,renderMatch];
  document.getElementById('right-panel').innerHTML='<div class="fade">'+fns[i]()+'</div>';
}
function next(){if(section<SECTIONS.length-1)goTo(section+1);}
function prev(){if(section>0)goTo(section-1);}

// ── MISSION ──
function renderMission(){
  var customerLogos=['datadog','clay','cursor','persona','vanta','watershed','1password'].map(function(c){
    return '<img src="https://dust.tt/static/landing/logos/gray/'+c+'.svg" alt="'+c+'" style="height:18px;opacity:.5;filter:grayscale(1)">';
  }).join('');
  var stats=[["5,000+","Organizations"],["80K+","Agents in production"],["12M","Conversations · 2025"],["70–90%","Typical adoption rate"]].map(function(x){
    return '<div style="background:#0F172A;color:#fff;border-radius:16px;padding:20px 24px"><div style="font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px">'+x[0]+'</div><div style="font-size:11px;color:#64748B">'+x[1]+'</div></div>';
  }).join('');
  return '<div style="padding:32px;max-width:580px">'
    +'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px">The thesis</div>'
    +'<h2 style="font-size:36px;font-weight:900;color:#0F172A;line-height:1.1;letter-spacing:-0.03em;margin-bottom:12px">AI that works for<br/>one person<br/><span style="color:#CBD5E1">half-works.</span></h2>'
    +'<p style="font-size:13px;color:#64748B;line-height:1.6;max-width:380px;margin-bottom:32px">Dust was built on one conviction: AI compounds when it\'s shared. Every agent built becomes infrastructure. Every insight becomes institutional memory.</p>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px">'+stats+'</div>'
    +'<div style="margin-bottom:32px">'
    +'<div style="font-size:10px;font-weight:700;color:#CBD5E1;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px">Trusted by</div>'
    +'<div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">'+customerLogos+'</div>'
    +'</div>'
    +'<div style="border-left:2px solid #0F172A;padding-left:16px">'
    +'<p style="font-size:13px;color:#334155;font-style:italic;margin-bottom:4px">"Not just a 10xer — a 100xer if we harness it right."</p>'
    +'<p style="font-size:11px;color:#94A3B8">Patrick Hall, Product Architect · Persona</p>'
    +'</div>'
    +'</div>';
}

// ── PRODUCT ──
function renderProduct(){
  var srcList=["Notion","Slack","GitHub","Google Drive","Salesforce"];
  var btns=srcList.map(function(s){var a=activeSources.indexOf(s)>-1;return '<button onclick="toggleSrc(\''+s+'\')" style="font-size:11px;padding:6px 12px;border-radius:8px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid '+(a?'#0F172A':'#E2E8F0')+';background:'+(a?'#0F172A':'#fff')+';color:'+(a?'#fff':'#64748B')+'">'+(a?'&#10003; ':'')+s+'</button>';}).join('');
  var previewTxt=activeSources.length===0?'No data sources connected — I cannot answer this yet.':'Based on '+activeSources[0]+', Project Atlas is in final review. Last updated Monday — 2 open blockers remain before the launch window.';
  return '<div style="padding:32px;max-width:560px">'
    +'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px">Interactive demo</div>'
    +'<h2 style="font-size:24px;font-weight:800;color:#0F172A;letter-spacing:-0.02em;margin-bottom:6px">Build an agent in 2 minutes.</h2>'
    +'<p style="font-size:13px;color:#64748B;margin-bottom:24px">Toggle data sources — watch the instructions and preview update live.</p>'
    +'<div style="background:#fff;border:1px solid #E2E8F0;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)">'
      +'<div style="background:#F8FAFC;border-bottom:1px solid #F1F5F9;padding:10px 16px;display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#FCA5A5"></div><div style="width:10px;height:10px;border-radius:50%;background:#FDE68A"></div><div style="width:10px;height:10px;border-radius:50%;background:#6EE7B7"></div><span style="font-size:11px;color:#94A3B8;margin-left:8px">dust.tt — New Agent</span></div>'
      +'<div style="padding:16px">'
        +'<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:6px">Model</div><div style="display:flex;align-items:center;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px 12px"><span style="font-size:12px;font-weight:500;color:#0F172A">Claude Sonnet 4.5</span><span style="margin-left:auto;font-size:11px;color:#94A3B8">&#9660;</span></div></div>'
        +'<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:6px">Data sources <span style="font-weight:400;color:#94A3B8">(click to toggle)</span></div><div id="src-btns" style="display:flex;flex-wrap:wrap;gap:8px">'+btns+'</div></div>'
        +'<div><div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:6px">Instructions</div><div style="background:#0F172A;border-radius:8px;padding:12px;font-size:11px;font-family:monospace;line-height:1.6"><span style="color:#93C5FD">You have access to</span> <span id="src-names" style="color:#6EE7B7">'+(activeSources.length>0?activeSources.join(', '):'no sources selected')+'</span><span style="color:#93C5FD">.</span><br/><span style="color:#CBD5E1">Answer using only what\'s in those sources.</span><br/><span style="color:#CBD5E1">Always cite where you found the information.</span></div></div>'
      +'</div>'
      +'<div style="border-top:1px solid #F1F5F9;background:#F8FAFC;padding:16px"><div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:12px">Preview</div>'
        +'<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><div style="background:#0F172A;color:#fff;font-size:11px;padding:8px 12px;border-radius:12px;border-top-right-radius:3px;max-width:260px">What\'s the status of Project Atlas?</div></div>'
        +'<div style="display:flex;gap:8px"><div style="width:24px;height:24px;background:#7C3AED;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-weight:700;font-size:9px">AI</span></div><div id="preview-reply" style="background:#fff;border:1px solid #E2E8F0;font-size:11px;padding:8px 12px;border-radius:12px;border-top-left-radius:3px;color:#334155;flex:1">'+previewTxt+'</div></div>'
      +'</div>'
    +'</div>'
    +'<p style="font-size:11px;color:#94A3B8;text-align:center;margin-top:10px">No code. No prompting expertise. This is the actual Dust interface.</p>'
    +'</div>';
}

function toggleSrc(s){
  var idx=activeSources.indexOf(s);
  if(idx>-1)activeSources.splice(idx,1);else activeSources.push(s);
  var srcList=["Notion","Slack","GitHub","Google Drive","Salesforce"];
  var c=document.getElementById('src-btns');
  if(c)c.innerHTML=srcList.map(function(x){var a=activeSources.indexOf(x)>-1;return '<button onclick="toggleSrc(\''+x+'\')" style="font-size:11px;padding:6px 12px;border-radius:8px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid '+(a?'#0F172A':'#E2E8F0')+';background:'+(a?'#0F172A':'#fff')+';color:'+(a?'#fff':'#64748B')+'">'+(a?'&#10003; ':'')+x+'</button>';}).join('');
  var n=document.getElementById('src-names');if(n)n.textContent=activeSources.length>0?activeSources.join(', '):'no sources selected';
  var r=document.getElementById('preview-reply');if(r)r.textContent=activeSources.length===0?'No data sources connected — I cannot answer this yet.':'Based on '+activeSources[0]+', Project Atlas is in final review. Last updated Monday — 2 open blockers remain before the launch window.';
}

// ── IN THE WILD ──
function renderWild(){
  var msgs=[
    {init:"SP",name:"Stanislas",bg:"#3730A3",time:"10:32",text:profile.priority==='technical'?"just traced the latency spike — model over-fetching context on long threads. 3-line fix, deploying now":"shipped the new retrieval fix \uD83C\uDF89 3x faster on large workspaces"},
    {init:"GH",name:"Gabriel",bg:"#6D28D9",time:"10:33",text:"already saw the metrics tick. what broke exactly?"},
    {init:"SP",name:"Stanislas",bg:"#3730A3",time:"10:34",text:"context window filling with noise before hitting the actual answer. logs made it obvious once I looked"},
    {init:"EH",name:"new hire",bg:"#475569",time:"10:35",text:"this is what i mean when I say everyone here moves fast"},
    {init:"GH",name:"Gabriel",bg:"#6D28D9",time:"10:36",text:"and we used a Dust agent to trace the logs \uD83D\uDE04 using our own product to ship faster"},
    {init:"SP",name:"Stanislas",bg:"#3730A3",time:"10:36",text:"^^ that's literally the job"}
  ];
  var slk=msgs.map(function(m){
    return '<div style="display:flex;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:'+m.bg+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">'+m.init+'</div><div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px"><span style="font-size:12px;font-weight:700;color:#0F172A">'+m.name+'</span><span style="font-size:10px;color:#94A3B8">'+m.time+' AM</span></div><p style="font-size:13px;color:#334155;margin:0">'+m.text+'</p></div></div>';
  }).join('');
  return '<div style="padding:32px;max-width:580px">'
    +'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px">A real day at Dust</div>'
    +'<h2 style="font-size:24px;font-weight:800;color:#0F172A;letter-spacing:-0.02em;margin-bottom:6px">This is what fast actually looks like.</h2>'
    +'<p style="font-size:13px;color:#64748B;margin-bottom:24px">From issue spotted to fix in production — before lunch.</p>'
    +'<div style="background:#fff;border:1px solid #E2E8F0;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px">'
      +'<div style="background:#1E293B;padding:10px 16px;display:flex;align-items:center;gap:6px"><div style="display:flex;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#FCA5A5"></div><div style="width:10px;height:10px;border-radius:50%;background:#FDE68A"></div><div style="width:10px;height:10px;border-radius:50%;background:#6EE7B7"></div></div><span style="color:#94A3B8;font-size:11px;font-weight:600;margin-left:8px"># eng-daily</span><span style="color:#475569;font-size:10px;margin-left:auto">Slack — Dust workspace</span></div>'
      +'<div style="padding:16px;display:flex;flex-direction:column;gap:16px"><div style="text-align:center"><span style="font-size:10px;color:#94A3B8;background:#F8FAFC;border:1px solid #F1F5F9;padding:3px 10px;border-radius:9999px">Today</span></div>'+slk+'</div>'
    +'</div>'
    +'<div style="background:#0F172A;border-radius:16px;overflow:hidden">'
      +'<div style="padding:10px 16px;border-bottom:1px solid #1E293B;display:flex;align-items:center;justify-content:space-between"><span style="color:#475569;font-size:11px;font-family:monospace">dust-tt/dust · core/src/agents/runner.ts</span><a href="https://github.com/dust-tt/dust" target="_blank" style="font-size:10px;color:#475569;text-decoration:none">View on GitHub &#8599;</a></div>'

function doAnalyze(text){
  var lower=text.toLowerCase();
  var s={fe:0,be:0,da:0,ai:0,ae:0,csm:0,ta:0,se:0};
  ["react","next","frontend","ui","ux","css","figma","design","component","interface"].forEach(function(k){if(lower.indexOf(k)>-1)s.fe++;});
  ["backend","typescript","rust","node","kubernetes","postgres","infrastructure","devops","api","fullstack","full-stack","cloud","system","java","python","scala"].forEach(function(k){if(lower.indexOf(k)>-1)s.be++;});
  ["data","sql","analytics","analyst","bi","dbt","snowflake","looker","metric","dashboard","ml","spark","pandas","jupyter"].forEach(function(k){if(lower.indexOf(k)>-1)s.da++;});
  ["product manager","pm ","roadmap","specs","0-to-1","strategy","gpt","llm","agent","automation","builder","no-code"].forEach(function(k){if(lower.indexOf(k)>-1)s.ai++;});
  ["sales","quota","revenue","closing","pipeline","crm","bdr","sdr","account executive","outbound","b2b"].forEach(function(k){if(lower.indexOf(k)>-1)s.ae++;});
  ["customer success","csm","onboarding","retention","account management","churn","nps"].forEach(function(k){if(lower.indexOf(k)>-1)s.csm++;});
  ["recruiter","recruiting","talent acquisition","hiring","sourcing","headhunting","candidate","people ops","talent partner"].forEach(function(k){if(lower.indexOf(k)>-1)s.ta++;});
  ["solutions engineer","pre-sales","presales","technical sales","demo","rfi","rfp","poc","implementation","se "].forEach(function(k){if(lower.indexOf(k)>-1)s.se++;});
  if(profile.background==="builder"){s.fe+=1;s.be+=1;}
  if(profile.background==="data")s.da+=2;
  if(profile.background==="product")s.ai+=2;
  if(profile.background==="business"){s.ae+=1;s.csm+=1;s.ta+=1;s.se+=1;}
  var max=Math.max(s.fe,s.be,s.da,s.ai,s.ae,s.csm,s.ta,s.se);
  var key="ai";
  if(s.fe===max&&s.fe>0)key="fe";
  else if(s.be===max&&s.be>0)key="be";
  else if(s.da===max&&s.da>0)key="da";
  else if(s.ae===max&&s.ae>0)key="ae";
  else if(s.csm===max&&s.csm>0)key="csm";
  else if(s.ta===max&&s.ta>0)key="ta";
  else if(s.se===max&&s.se>0)key="se";
  var strength=max>=4?"strong":max>=2?"good":"explore";
  var ROLES_MATCH={
    fe:{title:"Software Engineer, Frontend",salary:"€60K–€150K",signals:["React/Next.js","TypeScript","UI ownership","User-facing work"],tips:["React architecture decisions you've owned","Design system or component library work","Accessibility or performance impact","Frame work in user-facing outcomes"],link:"https://jobs.ashbyhq.com/dust/0e76888e-d271-485c-b72c-9d344b595f34"},
    be:{title:"Software Engineer",salary:"€40K–€150K",signals:["Full-stack/backend","TypeScript or Rust","Infrastructure","End-to-end ownership"],tips:["Features owned from API to production","Multi-language or infra work (Rust a bonus)","Open source contributions","System design trade-offs you've made"],link:"https://jobs.ashbyhq.com/dust/ec0ae613-e480-4d93-b89f-1d6a89db9766"},
    da:{title:"Product Data Analyst",salary:"€70K–€110K",signals:["Data/analytics background","SQL proficiency","Product-oriented metrics","Tooling built for teams"],tips:["How your data work influenced product decisions","Experimentation/A-B testing depth","Self-serve tooling for non-technical teammates","Show impact, not just tools used"],link:"https://jobs.ashbyhq.com/dust/5426749b-1c1a-494b-932e-1299dbd4f883"},
    ai:{title:"AI Builder (Open Role)",salary:"Competitive",signals:["AI/product interest","Builder mindset","Cross-functional experience","Domain expertise"],tips:["Real AI builds — not buzzwords, actual shipped work","Agents or automation you've deployed","Why Dust specifically resonates with you","Initiative matters as much as background here"],link:"https://jobs.ashbyhq.com/dust/11b8dbb0-6859-4826-b05c-083474483e1a"},
    ae:{title:"Account Executive",salary:"Competitive + equity",signals:["B2B SaaS sales","Quota-carrying experience","Enterprise or mid-market","AI product interest"],tips:["Quota attainment and deal size context","Technical product selling — how you learn and demo","Why AI infrastructure (not just AI tools) matters to you","Your approach to multi-threaded enterprise deals"],link:"https://jobs.ashbyhq.com/dust/490980d2-422c-4329-8776-093e74e9a91f"},
    csm:{title:"Customer Success Manager",salary:"Competitive",signals:["Customer success background","Retention/onboarding focus","Technical product affinity","Account management"],tips:["Retention metrics you've owned and improved","How you handle onboarding for complex products","AI tools you've used internally or deployed for customers","Examples of turning at-risk accounts around"],link:"https://jobs.ashbyhq.com/dust/949b4370-93b5-4629-8060-2fe0aca0d016"},
    ta:{title:"Senior Talent Acquisition Partner",salary:"Competitive",signals:["Talent acquisition background","Tech hiring experience","Candidate experience focus","Startup or scale-up environment"],tips:["Engineering roles you've closed at a technical depth","How you've improved candidate experience metrics","Sourcing strategies that worked in competitive markets","Your take on AI's role in recruiting — and Dust's specifically"],link:"https://jobs.ashbyhq.com/dust/5f996467-a3ff-404b-922d-c39c2c718f75"},
    se:{title:"Solutions Engineer",salary:"Competitive",signals:["Pre-sales or solutions engineering","Technical customer-facing","Demo and POC experience","Implementation background"],tips:["Complex deals you've technically owned end-to-end","How you build and deliver product demos","API/integration depth — can you go deep with CTOs?","POC success rate and methodology"],link:"https://jobs.ashbyhq.com/dust/54d23ce3-f59f-447f-87a4-4549a6a8074f"}
  };
  var role=ROLES_MATCH[key];
  var cfg={
    strong:{bg:"#F0FDF4",border:"#BBF7D0",badge:"#DCFCE7",badgeText:"#166534",dot:"#22C55E",label:"Strong Match"},
    good:{bg:"#EFF6FF",border:"#BFDBFE",badge:"#DBEAFE",badgeText:"#1E40AF",dot:"#3B82F6",label:"Good Match"},
    explore:{bg:"#FFFBEB",border:"#FDE68A",badge:"#FEF3C7",badgeText:"#92400E",dot:"#F59E0B",label:"Worth Exploring"}
  }[strength];
  var signals=role.signals.map(function(s){return '<span style="background:#fff;border:1px solid #E2E8F0;color:#334155;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500">&#10003; '+s+'</span>';}).join('');
  var tips=role.tips.map(function(t){return '<li style="font-size:12px;color:#475569;display:flex;gap:8px;margin-bottom:6px"><span style="color:#CBD5E1;flex-shrink:0;margin-top:1px">&#8594;</span>'+t+'</li>';}).join('');
  var html='<div style="border:1px solid '+cfg.border+';border-radius:16px;padding:20px;background:'+cfg.bg+'">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">'
    +'<div><div style="font-size:14px;font-weight:700;color:#0F172A;margin-bottom:4px">'+role.title+'</div><div style="font-size:11px;color:#64748B">&#128176; '+role.salary+' + equity &middot; &#128205; Paris</div></div>'
    +'<span style="font-size:11px;font-weight:700;padding:5px 10px;border-radius:9999px;background:'+cfg.badge+';color:'+cfg.badgeText+';display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0"><span style="width:6px;height:6px;border-radius:50%;background:'+cfg.dot+';display:inline-block"></span>'+cfg.label+'</span>'
    +'</div>'
    +'<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#475569;margin-bottom:7px">Detected from your profile:</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+signals+'</div></div>'
    +'<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:600;color:#475569;margin-bottom:7px">What to highlight when you apply:</div><ul style="margin:0;padding:0;list-style:none">'+tips+'</ul></div>'
    +'<a href="'+role.link+'" target="_blank" style="display:block;width:100%;background:#0F172A;color:#fff;font-size:12px;font-weight:700;padding:12px;border-radius:10px;text-align:center;text-decoration:none;box-sizing:border-box;margin-bottom:8px">Apply for this role &#8599;</a>'
    +'<button onclick="resetMatch()" style="width:100%;font-size:11px;color:#94A3B8;background:none;border:none;cursor:pointer;padding:4px">Try a different profile</button>'
    +'</div>';
  var f=document.getElementById('match-form'),r=document.getElementById('match-result');
  if(f)f.style.display='none';
  if(r){r.style.display='block';r.innerHTML=html;}
}
function resetMatch(){
  var f=document.getElementById('match-form'),r=document.getElementById('match-result');
  if(f)f.style.display='block';if(r)r.style.display='none';
}
