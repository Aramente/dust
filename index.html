// 7. ROLES + CASE STUDIES
function sRoles(){
  var rlist=ROLES[CAT]||ROLES.eng;
  var rcards=rlist.map(function(r){
    var border=r.top?'border:1px solid #0F172A;box-shadow:0 1px 6px rgba(0,0,0,.08)':'border:1px solid #F1F5F9';
    var badge=r.top?'<div style="font-size:10px;font-weight:700;color:#0F172A;margin-bottom:8px;display:flex;align-items:center;gap:5px"><span style="width:5px;height:5px;background:#10B981;border-radius:50%;display:inline-block"></span>Top match for your track</div>':'';
    var tags=r.skills.map(function(s){return '<span style="background:#F1F5F9;color:#475569;font-size:10px;font-weight:600;padding:3px 7px;border-radius:5px">'+s+'</span>';}).join('');
    var btnBg=r.top?'background:#0F172A;color:#fff;border:none':'background:#fff;color:#0F172A;border:1px solid #E2E8F0';
    return '<div style="'+border+';border-radius:12px;padding:14px;margin-bottom:8px">'+badge+'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px"><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#0F172A;margin-bottom:3px">'+r.title+'</div><div style="font-size:11px;color:#64748B;margin-bottom:8px">'+r.dept+' · '+r.loc+' · '+r.salary+'</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+tags+'</div></div><a href="'+r.link+'" target="_blank" class="apply-btn" style="font-size:11px;padding:7px 12px;'+btnBg+';border-radius:7px">Apply &#8599;</a></div></div>';
  }).join('');
  var clist=CASES[CAT]||CASES.eng;
  var ccards=clist.map(function(c){
    return '<a href="'+c.link+'" target="_blank" class="card" style="display:block;padding:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><img src="https://dust.tt/static/landing/logos/gray/'+c.logo+'.svg" style="height:14px;opacity:.5;filter:grayscale(1)" alt="'+c.co+'"><span style="font-size:12px;font-weight:700;color:#0F172A">'+c.co+'</span><span style="margin-left:auto;font-size:22px;font-weight:900;color:#0F172A;letter-spacing:-0.02em">'+c.metric+'</span></div><div style="font-size:10px;font-weight:600;color:#94A3B8;margin-bottom:7px">'+c.label+'</div><p style="font-size:11px;color:#64748B;font-style:italic;line-height:1.5;margin-bottom:6px">'+c.quote+'</p><div style="font-size:10px;color:#94A3B8">'+c.author+(c.author?' · ':'')+c.role+'</div></a>';
  }).join('');
  return '<div style="padding:28px;max-width:620px">'
    +'<div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px">Open roles</div>'
    +'<h2 style="font-size:22px;font-weight:800;color:#0F172A;letter-spacing:-0.02em;margin-bottom:6px">26 open positions. All with real ownership.</h2>'
    +'<p style="font-size:13px;color:#64748B;margin-bottom:18px">Roles matched to your track. All include meaningful equity. <a href="https://dust.tt/jobs" target="_blank" style="color:#0F172A;font-weight:600">View all 26 &#8599;</a></p>'
    +rcards
    +'<div style="margin-top:24px"><div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Companies in your function — already winning with Dust</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+ccards+'</div></div>'
    +'</div>';
}
