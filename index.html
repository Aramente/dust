<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dust — Candidate Experience</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif}
.fade{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="bg-white h-screen overflow-hidden">

<div id="onboarding" class="h-screen flex items-center justify-center p-6 bg-white">
  <div class="max-w-md w-full" id="ob-inner"></div>
</div>

<div id="tour" style="display:none" class="h-screen flex flex-col">
  <div class="border-b border-slate-100 px-5 py-3 flex items-center gap-3 shrink-0">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 bg-slate-900 rounded-lg flex items-center justify-center">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <span class="font-bold text-sm">dust</span>
      <span class="text-slate-200 mx-1">·</span>
      <span class="text-xs text-slate-400">Candidate Experience</span>
    </div>
    <div id="section-tabs" class="flex items-center gap-1.5 ml-auto"></div>
  </div>
  <div class="flex-1 flex overflow-hidden">
    <div class="w-72 border-r border-slate-100 flex flex-col shrink-0 bg-slate-50">
      <div class="flex-1 p-6 flex flex-col justify-between">
        <div>
          <div class="flex items-center gap-2.5 mb-6">
            <div class="w-8 h-8 bg-slate-900 rounded-full flex items-center justify-center"><span class="text-white text-xs font-bold">A</span></div>
            <div><div class="text-xs font-semibold text-slate-900">Alex</div><div class="text-xs text-slate-400">Dust Recruiting Guide</div></div>
            <span class="ml-auto w-1.5 h-1.5 bg-green-500 rounded-full"></span>
          </div>
          <div id="left-caption"></div>
        </div>
        <div>
          <div id="section-dots" class="flex items-center gap-1.5 mb-5"></div>
          <div class="flex gap-2">
            <button id="btn-prev" onclick="prev()" class="flex-1 border border-slate-200 text-slate-600 text-xs font-medium py-2.5 rounded-xl hover:border-slate-400 transition-all">&#8592; Back</button>
            <button id="btn-next" onclick="next()" class="flex-1 bg-slate-900 text-white text-xs font-medium py-2.5 rounded-xl hover:bg-slate-700 transition-all">Next &#8594;</button>
          </div>
          <div class="mt-3 text-center"><button onclick="goTo(5)" class="text-xs text-slate-400 hover:text-slate-700 transition-colors">Skip to match assessment</button></div>
        </div>
      </div>
      <div class="border-t border-slate-200 p-3">
        <div class="flex items-center gap-1.5 text-xs text-slate-400">
          <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
          Tailored for <span id="profile-tag" class="font-medium text-slate-600 ml-1"></span>
        </div>
      </div>
    </div>
    <div id="right-panel" class="flex-1 overflow-y-auto"></div>
  </div>
</div>

<script>
var profile={background:'',priority:''};
var section=0;
var activeSources=["Notion","Slack","GitHub"];
var BG=[
  {id:"builder",label:"I build products & systems",sub:"Engineering, dev, technical roles"},
  {id:"data",label:"I work with data & insights",sub:"Analytics, data science, BI, research"},
  {id:"product",label:"I shape what gets built",sub:"Product, design, strategy, UX"},
  {id:"business",label:"I grow or operate businesses",sub:"Sales, marketing, ops, GTM, HR, recruitment"}
];
var PRI=[
  {id:"ownership",label:"Autonomy & ownership",sub:"I want to own things end-to-end"},
  {id:"team",label:"Team & culture",sub:"The people I work with matter most"},
  {id:"technical",label:"Technical challenge",sub:"I want hard problems"},
  {id:"impact",label:"Impact & mission",sub:"I want to see real-world results"}
];
var SECTIONS=["Mission","Product","In the Wild","Team","Roles","Match"];

function renderOnboarding(step){
  var items=step===0?BG:PRI;
  var logo='<div class="flex items-center gap-2 mb-10"><div class="w-7 h-7 bg-slate-900 rounded-lg flex items-center justify-center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><span class="font-bold text-sm">dust</span><span class="text-slate-300 text-sm mx-1">&#183;</span><span class="text-xs text-slate-400">Candidate Experience</span></div>';
  var hdr=step===0
    ?'<div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Before we start — question 1 of 2</div><h1 class="text-2xl font-bold text-slate-900 mb-2">What best describes your background?</h1><p class="text-sm text-slate-500 mb-6">I\'ll tailor the tour to what\'s most relevant for you.</p>'
    :'<div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Question 2 of 2</div><h1 class="text-2xl font-bold text-slate-900 mb-2">What matters most in your next role?</h1><p class="text-sm text-slate-500 mb-6">No right answer — this shapes how I frame things.</p>';
  var btns=items.map(function(o){
    var fn=step===0?"selectBg('"+o.id+"')" :"selectPri('"+o.id+"')";
    return '<button onclick="'+fn+'" class="w-full text-left border border-slate-200 rounded-xl px-4 py-3.5 hover:border-slate-900 hover:bg-slate-50 transition-all mb-2"><div class="text-sm font-semibold text-slate-900">'+o.label+'</div><div class="text-xs text-slate-400 mt-0.5">'+o.sub+'</div></button>';
  }).join('');
  document.getElementById('ob-inner').innerHTML=logo+hdr+btns;
}

function selectBg(id){profile.background=id;renderOnboarding(1);}
function selectPri(id){
  profile.priority=id;
  document.getElementById('onboarding').style.display='none';
  var t=document.getElementById('tour');t.style.display='flex';t.style.flexDirection='column';
  initTour();
}

function getCaption(i){
  var bg=profile.background,pri=profile.priority;
  return [
    {title:"One belief changed everything.",sub:bg==='business'?"AI compounds when shared across a whole company — not siloed in individual tools.":pri==='impact'?"AI compounds when shared — not siloed in individual chatbots. The mission is real.":"AI only works as team infrastructure. That's the insight Dust was built on."},
    {title:bg==='business'||bg==='product'?"No code. No prompts. Real results.":"See it to believe it.",sub:bg==='business'?"Anyone in your company can use agents built by one person. Here's how it works.":bg==='product'?"Here's the Dust interface — a PM's dream: ship agents like features.":"Here's what building and using an agent looks like inside Dust."},
    {title:pri==='technical'?"Shipped in the morning. In production by noon.":bg==='business'?"This is what a high-trust, high-output team looks like.":"Culture isn't written. It's lived.",sub:bg==='business'?"A real glimpse at how Dust operates internally — using its own product every day.":pri==='team'?"A real glimpse at how the team moves day-to-day.":"A real day inside the Dust team."},
    {title:"~40 people. Exceptional backgrounds.",sub:bg==='business'?"Founders from OpenAI and Stripe. You'd work with people who've scaled things before.":pri==='ownership'?"Small enough that everyone has massive scope from day one.":"You'd work directly with these people, including the founders."},
    {title:bg==='business'?"There's a role for every kind of builder.":"Based on your background...",sub:bg==='business'||bg==='product'?"Dust hires for mindset as much as background. The AI Builder role is deliberately broad.":"Here's where you'd likely land at Dust. The top card is personalized for you."},
    {title:"Let's find out if you're a fit.",sub:bg==='business'?"Describe what you do and I'll tell you where you'd land — honestly.":"Paste your background or use a quick option. I'll give you an honest read."}
  ][i];
}

function initTour(){
  document.getElementById('section-tabs').innerHTML=SECTIONS.map(function(s,i){
    return '<button onclick="goTo('+i+')" id="tab-'+i+'" class="text-xs font-medium px-2.5 py-1 rounded-lg transition-all text-slate-400 hover:text-slate-700 hover:bg-slate-50">'+s+'</button>';
  }).join('');
  var bg=BG.find(function(b){return b.id===profile.background;});
  document.getElementById('profile-tag').textContent=bg?bg.label.replace('I build','building').replace('I work','working').replace('I shape','shaping').replace('I grow','growing'):'';
  goTo(0);
}

function goTo(i){
  section=i;
  var cap=getCaption(i);
  document.getElementById('section-dots').innerHTML=SECTIONS.map(function(_,j){
    return '<button onclick="goTo('+j+')" style="width:'+(j===i?'20px':'6px')+';height:6px" class="rounded-full transition-all '+(j===i?'bg-slate-900':'bg-slate-300 hover:bg-slate-400')+'"></button>';
  }).join('');
  document.getElementById('left-caption').innerHTML='<div class="fade"><h3 class="text-lg font-bold text-slate-900 leading-snug mb-2">'+cap.title+'</h3><p class="text-sm text-slate-500 leading-relaxed">'+cap.sub+'</p></div>';
  SECTIONS.forEach(function(_,j){
    var tab=document.getElementById('tab-'+j);
    if(tab)tab.className='text-xs font-medium px-2.5 py-1 rounded-lg transition-all '+(j===i?'bg-slate-900 text-white':'text-slate-400 hover:text-slate-700 hover:bg-slate-50');
  });
  document.getElementById('btn-prev').style.opacity=i===0?'0.3':'1';
  document.getElementById('btn-next').style.opacity=i===SECTIONS.length-1?'0.3':'1';
  var fns=[renderMission,renderProduct,renderWild,renderTeam,renderRoles,renderMatch];
  document.getElementById('right-panel').innerHTML='<div class="fade">'+fns[i]()+'</div>';
}
function next(){if(section<SECTIONS.length-1)goTo(section+1);}
function prev(){if(section>0)goTo(section-1);}

function renderMission(){
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">The thesis</div><h2 class="text-4xl font-bold text-slate-900 leading-tight mb-3">AI that works for<br/>one person<br/><span class="text-slate-300">half-works.</span></h2><p class="text-sm text-slate-500 leading-relaxed mb-8 max-w-sm">Dust was built on one conviction: the value of AI compounds when shared. Every agent becomes infrastructure. Every insight becomes institutional knowledge.</p><div class="grid grid-cols-2 gap-3 mb-8">'+[["5,000+","Organizations"],["80K+","Agents in production"],["12M","Conversations in 2025"],["70-90%","Typical adoption rate"]].map(function(x){return '<div class="bg-slate-900 text-white rounded-2xl p-5"><div class="text-3xl font-bold mb-1">'+x[0]+'</div><div class="text-xs text-slate-400">'+x[1]+'</div></div>';}).join('')+'</div><div class="border-l-2 border-slate-900 pl-4"><p class="text-sm text-slate-700 italic mb-1">"Not just a 10xer — a 100xer if we harness it right."</p><p class="text-xs text-slate-400">Patrick Hall, Product Architect &middot; Persona</p></div></div></div>';
}

function renderProduct(){
  var srcList=["Notion","Slack","GitHub","Google Drive","Salesforce"];
  var btns=srcList.map(function(s){var a=activeSources.indexOf(s)>-1;return '<button onclick="toggleSrc(\''+s+'\')" class="text-xs px-3 py-1.5 rounded-lg border font-medium transition-all '+(a?'bg-slate-900 text-white border-slate-900':'bg-white text-slate-500 border-slate-200 hover:border-slate-400')+'">'+(a?'&#10003; ':'')+s+'</button>';}).join('');
  var previewTxt=activeSources.length===0?'No data sources connected.':'Based on '+activeSources[0]+', Project Atlas is in final review. 2 open blockers remain before launch.';
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">Interactive demo</div><h2 class="text-2xl font-bold text-slate-900 mb-1">Build an agent in 2 minutes.</h2><p class="text-sm text-slate-500 mb-6">Toggle data sources — watch the agent update live.</p><div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm"><div class="bg-slate-50 border-b border-slate-100 px-4 py-2.5 flex items-center gap-2"><div class="flex gap-1.5"><div class="w-2.5 h-2.5 bg-red-400 rounded-full"></div><div class="w-2.5 h-2.5 bg-yellow-400 rounded-full"></div><div class="w-2.5 h-2.5 bg-green-400 rounded-full"></div></div><span class="text-xs text-slate-400 ml-2">dust.tt — New Agent</span></div><div class="p-4 space-y-4"><div><div class="text-xs font-semibold text-slate-500 mb-1.5">Model</div><div class="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-3 py-2"><span class="text-xs font-medium text-slate-700">Claude Sonnet 4.5</span><span class="ml-auto text-xs text-slate-400">&#9660;</span></div></div><div><div class="text-xs font-semibold text-slate-500 mb-1.5">Data sources <span class="font-normal text-slate-400">(click to toggle)</span></div><div id="src-btns" class="flex flex-wrap gap-2">'+btns+'</div></div><div><div class="text-xs font-semibold text-slate-500 mb-1.5">Instructions</div><div class="bg-slate-900 rounded-lg px-3 py-2.5 text-xs font-mono leading-relaxed"><span class="text-blue-300">You have access to</span> <span id="src-names" class="text-green-400">'+(activeSources.length>0?activeSources.join(', '):'no sources selected')+'</span><span class="text-blue-300">.</span><br/><span class="text-slate-300">Answer using only what\'s in those sources.</span></div></div></div><div class="border-t border-slate-100 bg-slate-50 p-4"><div class="text-xs font-semibold text-slate-500 mb-3">Preview</div><div class="space-y-2.5"><div class="flex justify-end"><div class="bg-slate-900 text-white text-xs px-3 py-2 rounded-xl rounded-tr-sm">What\'s the status of Project Atlas?</div></div><div class="flex gap-2"><div class="w-6 h-6 bg-violet-600 rounded-full flex items-center justify-center shrink-0" style="font-size:9px"><span class="text-white font-bold">AI</span></div><div id="preview-reply" class="bg-white border border-slate-200 text-xs px-3 py-2 rounded-xl rounded-tl-sm text-slate-700 flex-1">'+previewTxt+'</div></div></div></div></div><p class="text-xs text-slate-400 text-center mt-3">No code. No prompting expertise. This is the actual Dust interface.</p></div></div>';
}

function toggleSrc(s){
  var idx=activeSources.indexOf(s);
  if(idx>-1)activeSources.splice(idx,1);else activeSources.push(s);
  var srcList=["Notion","Slack","GitHub","Google Drive","Salesforce"];
  var c=document.getElementById('src-btns');
  if(c)c.innerHTML=srcList.map(function(x){var a=activeSources.indexOf(x)>-1;return '<button onclick="toggleSrc(\''+x+'\')" class="text-xs px-3 py-1.5 rounded-lg border font-medium transition-all '+(a?'bg-slate-900 text-white border-slate-900':'bg-white text-slate-500 border-slate-200 hover:border-slate-400')+'">'+(a?'&#10003; ':'')+x+'</button>';}).join('');
  var n=document.getElementById('src-names');if(n)n.textContent=activeSources.length>0?activeSources.join(', '):'no sources selected';
  var r=document.getElementById('preview-reply');if(r)r.textContent=activeSources.length===0?'No data sources connected.':'Based on '+activeSources[0]+', Project Atlas is in final review. 2 open blockers remain before launch.';
}

function renderWild(){
  var msgs=[
    {init:"SP",name:"Stanislas",color:"bg-indigo-600",time:"10:32",text:profile.priority==='technical'?"just traced the latency spike — model over-fetching context on long threads. 3-line fix, deploying now":"shipped the new retrieval fix \uD83C\uDF89 3x faster on large workspaces"},
    {init:"GH",name:"Gabriel",color:"bg-violet-600",time:"10:33",text:"already saw the metrics tick. what broke exactly?"},
    {init:"SP",name:"Stanislas",color:"bg-indigo-600",time:"10:34",text:"context window filling with noise before the actual answer. logs made it obvious once I looked"},
    {init:"EH",name:"new hire",color:"bg-slate-500",time:"10:35",text:"this is what i mean when I say everyone here moves fast"},
    {init:"GH",name:"Gabriel",color:"bg-violet-600",time:"10:36",text:"and we used a Dust agent to trace the logs \uD83D\uDE04 using our own product to ship faster"},
    {init:"SP",name:"Stanislas",color:"bg-indigo-600",time:"10:36",text:"^^ that's literally the job"}
  ];
  var slk=msgs.map(function(m){return '<div class="flex gap-3"><div class="w-8 h-8 rounded-lg '+m.color+' flex items-center justify-center text-white text-xs font-bold shrink-0">'+m.init+'</div><div><div class="flex items-baseline gap-2 mb-0.5"><span class="text-xs font-bold text-slate-900">'+m.name+'</span><span class="text-xs text-slate-400">'+m.time+' AM</span></div><p class="text-sm text-slate-700">'+m.text+'</p></div></div>';}).join('');
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">A real day at Dust</div><h2 class="text-2xl font-bold text-slate-900 mb-1">This is what fast actually looks like.</h2><p class="text-sm text-slate-500 mb-6">From issue spotted to fix in production — before lunch.</p><div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm mb-5"><div class="bg-slate-800 px-4 py-2.5 flex items-center gap-2"><div class="flex gap-1.5"><div class="w-2.5 h-2.5 bg-red-400 rounded-full"></div><div class="w-2.5 h-2.5 bg-yellow-400 rounded-full"></div><div class="w-2.5 h-2.5 bg-green-400 rounded-full"></div></div><span class="text-slate-300 text-xs ml-2 font-medium"># eng-daily</span><span class="text-slate-500 text-xs ml-auto">Slack — Dust workspace</span></div><div class="p-4 space-y-4"><div class="flex justify-center"><span class="text-xs text-slate-400 bg-slate-50 border border-slate-100 px-3 py-1 rounded-full">Today</span></div>'+slk+'</div></div><div class="bg-slate-900 rounded-2xl overflow-hidden"><div class="px-4 py-2.5 border-b border-slate-700 flex items-center justify-between"><span class="text-slate-400 text-xs font-mono">dust-tt/dust &middot; core/src/agents/runner.ts</span><a href="https://github.com/dust-tt/dust" target="_blank" class="text-xs text-slate-500 hover:text-slate-300">View on GitHub &#8599;</a></div><pre class="p-4 text-xs font-mono leading-relaxed overflow-x-auto"><code><span class="text-slate-500">// The core agent execution loop</span>\n<span class="text-blue-400">export async function</span> <span class="text-green-400">runAgent</span><span class="text-slate-300">(</span>\n  <span class="text-orange-300">auth</span><span class="text-slate-400">: Authenticator,</span>\n  <span class="text-orange-300">config</span><span class="text-slate-400">: AgentConfig,</span>\n  <span class="text-orange-300">conversation</span><span class="text-slate-400">: ConversationWithContent</span>\n<span class="text-slate-300">)</span><span class="text-slate-400">: Promise&lt;AgentRunResult&gt; {</span>\n  <span class="text-blue-400">const</span> <span class="text-slate-300">model</span> <span class="text-slate-400">= await</span> <span class="text-green-400">selectModel</span><span class="text-slate-300">(config.model);</span>\n  <span class="text-blue-400">const</span> <span class="text-slate-300">ctx</span> <span class="text-slate-400">= await</span> <span class="text-green-400">buildContext</span><span class="text-slate-300">(auth, conversation);</span>\n  <span class="text-blue-400">return</span> <span class="text-slate-300">model.<span class="text-green-400">run</span>({ config, context: ctx });</span>\n<span class="text-slate-300">}</span></code></pre></div></div></div>';
}

function renderTeam(){
  var founders=[
    {init:"SP",bg:"bg-slate-900",name:"Stanislas Polu",role:"Co-founder & CEO",prev:["OpenAI Research Scientist","Worked on GPT-3 & RLHF"],note:"Left OpenAI to fix the team AI problem"},
    {init:"GH",bg:"bg-slate-700",name:"Gabriel Hubert",role:"Co-founder & CPO",prev:["ex-Stripe","ex-Front (co-founder)"],note:"Built products at scale before founding Dust"}
  ];
  var cards=founders.map(function(p){return '<div class="bg-slate-50 border border-slate-100 rounded-2xl p-4"><div class="w-12 h-12 '+p.bg+' rounded-2xl flex items-center justify-center text-white font-bold mb-3">'+p.init+'</div><div class="text-xs font-bold text-slate-900 mb-0.5">'+p.name+'</div><div class="text-xs text-slate-500 mb-3">'+p.role+'</div>'+p.prev.map(function(x){return '<div class="text-xs text-slate-400 flex gap-1.5 mb-0.5"><span class="text-slate-300">&middot;</span>'+x+'</div>';}).join('')+'<div class="mt-3 text-xs text-slate-400 italic border-t border-slate-200 pt-2">"'+p.note+'"</div></div>';}).join('');
  var alumni=["Stripe","OpenAI","Front","Stanford","Google","Airbnb","Datadog","Notion"].map(function(c){return '<span class="bg-slate-50 border border-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-xl font-medium">'+c+'</span>';}).join('');
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">The people</div><h2 class="text-2xl font-bold text-slate-900 mb-6">Built by people who\'ve done it before.</h2><div class="grid grid-cols-2 gap-4 mb-5">'+cards+'</div><div class="bg-white border border-slate-100 rounded-2xl p-4 mb-4"><div class="text-xs font-semibold text-slate-500 mb-3">~40 people &middot; Paris & San Francisco &middot; alumni from</div><div class="flex flex-wrap gap-2">'+alumni+'</div></div><div class="bg-slate-900 text-white rounded-2xl p-4"><div class="text-xs text-slate-400 mb-1">What this means for you</div><div class="text-sm font-medium">The founders interview every candidate. You\'d work directly with them from day one — not as a number, but as someone they chose personally.</div></div></div></div>';
}

function renderRoles(){
  var bgToRole={builder:"backend",data:"data",product:"builder",business:"builder"};
  var preferred=bgToRole[profile.background]||"backend";
  var roles=[
    {id:"frontend",title:"Software Engineer, Frontend",salary:"€60K–€150K",skills:["React","Next.js","TypeScript","shadcn"],link:"https://jobs.ashbyhq.com/dust/0e76888e-d271-485c-b72c-9d344b595f34"},
    {id:"backend",title:"Software Engineer",salary:"€40K–€150K",skills:["TypeScript","Rust","Kubernetes","PostgreSQL"],link:"https://jobs.ashbyhq.com/dust/ec0ae613-e480-4d93-b89f-1d6a89db9766"},
    {id:"data",title:"Product Data Analyst",salary:"€70K–€110K",skills:["SQL","A/B Testing","Dashboards","Product metrics"],link:"https://jobs.ashbyhq.com/dust/5426749b-1c1a-494b-932e-1299dbd4f883"},
    {id:"builder",title:"AI Builder (Open Role)",salary:"Competitive",skills:["Builder mindset","AI passion","Ownership"],link:"https://jobs.ashbyhq.com/dust/11b8dbb0-6859-4826-b05c-083474483e1a"}
  ];
  roles.sort(function(a,b){return a.id===preferred?-1:b.id===preferred?1:0;});
  var cards=roles.map(function(r,i){
    var border=i===0?'border-slate-900 shadow-sm':'border-slate-100';
    var badge=i===0?'<div class="text-xs font-semibold text-slate-900 mb-2.5 flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-green-500 rounded-full inline-block"></span>Best match for your background</div>':'';
    var btn=i===0?'<a href="'+r.link+'" target="_blank" class="text-xs font-semibold px-3 py-2 rounded-xl shrink-0 bg-slate-900 text-white hover:bg-slate-700 transition-colors">Apply &#8599;</a>':'<a href="'+r.link+'" target="_blank" class="text-xs font-semibold px-3 py-2 rounded-xl shrink-0 border border-slate-200 text-slate-700 hover:border-slate-400 transition-colors">Apply &#8599;</a>';
    var tags=r.skills.map(function(s){return '<span class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-lg">'+s+'</span>';}).join('');
    return '<div class="border rounded-2xl p-4 '+border+'">'+badge+'<div class="flex items-start justify-between gap-3"><div class="flex-1"><div class="text-sm font-bold text-slate-900 mb-1">'+r.title+'</div><div class="text-xs text-slate-500 mb-2">&#128205; Paris &middot; &#128176; '+r.salary+' + equity</div><div class="flex flex-wrap gap-1.5">'+tags+'</div></div>'+btn+'</div></div>';
  }).join('');
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">Open roles</div><h2 class="text-2xl font-bold text-slate-900 mb-1">4 roles. All shape the product.</h2><p class="text-sm text-slate-500 mb-6">The top one matches your background. All include meaningful equity.</p><div class="space-y-3">'+cards+'</div></div></div>';
}

function renderMatch(){
  var qMap={
    builder:["Frontend engineer — React & TypeScript","Backend / full-stack — Node, Kubernetes, Rust","Full-stack — own features end-to-end","Infrastructure / DevOps — cloud & platform"],
    data:["Product analyst — SQL, metrics, A-B testing","Data scientist — ML, experimentation, Python","BI analyst — dashboards, Looker, Snowflake","Growth analyst — funnel metrics, attribution"],
    product:["Product manager — roadmap, specs, cross-functional","Product designer — UX, user research, Figma","Head of product — 0-to-1 and scaling","Strategy / ops — problem solving, cross-team"],
    business:["Sales / AE — SaaS, quota-carrying, technical deals","Recruiter / TA — tech hiring, candidate experience","Marketing — brand, content, demand generation","Ops / COO-type — process, efficiency, execution"]
  };
  var list=qMap[profile.background]||qMap.business;
  var quick=list.map(function(q,i){return '<button onclick="analyzeQuick('+i+')" class="w-full text-left bg-white border border-slate-200 text-slate-700 text-xs px-4 py-3 rounded-xl hover:border-slate-400 transition-colors">'+q+'</button>';}).join('');
  return '<div class="p-8"><div class="max-w-lg"><div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">Match assessment</div><h2 class="text-2xl font-bold text-slate-900 mb-1">Are you a fit for Dust?</h2><p class="text-sm text-slate-500 mb-6">Paste your LinkedIn bio, describe your background, or pick a quick option below.</p><div id="match-form"><textarea id="match-input" placeholder="e.g. Recruiter with 4 years experience in tech hiring, specializing in engineering roles at startups. Built hiring pipelines from scratch..." class="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-sm text-slate-700 placeholder-slate-400 outline-none focus:border-slate-400 resize-none mb-3" rows="4"></textarea><button onclick="analyzeInput()" class="w-full bg-slate-900 text-white text-sm font-semibold py-3 rounded-xl hover:bg-slate-700 transition-colors mb-5">Analyze my profile &#8594;</button><div class="text-xs text-slate-400 text-center mb-3">or pick a quick option</div><div class="space-y-2">'+quick+'</div></div><div id="match-result" style="display:none"></div></div></div>';
}

var _quickList=null;
function analyzeQuick(i){
  var qMap={
    builder:["Frontend engineer — React & TypeScript","Backend / full-stack — Node, Kubernetes, Rust","Full-stack — own features end-to-end","Infrastructure / DevOps — cloud & platform"],
    data:["Product analyst — SQL, metrics, A-B testing","Data scientist — ML, experimentation, Python","BI analyst — dashboards, Looker, Snowflake","Growth analyst — funnel metrics, attribution"],
    product:["Product manager — roadmap, specs, cross-functional","Product designer — UX, user research, Figma","Head of product — 0-to-1 and scaling","Strategy / ops — problem solving, cross-team"],
    business:["Sales / AE — SaaS, quota-carrying, technical deals","Recruiter / TA — tech hiring, candidate experience","Marketing — brand, content, demand generation","Ops / COO-type — process, efficiency, execution"]
  };
  doAnalyze((qMap[profile.background]||qMap.business)[i]);
}
function analyzeInput(){var v=document.getElementById('match-input');if(v&&v.value.trim())doAnalyze(v.value.trim());}

function doAnalyze(text){
  var lower=text.toLowerCase();
  var s={fe:0,be:0,da:0,ai:0};
  ["react","next","frontend","ui","ux","css","html","vue","angular","figma","design"].forEach(function(k){if(lower.indexOf(k)>-1)s.fe++;});
  ["backend","typescript","rust","node","kubernetes","postgres","infrastructure","devops","api","fullstack","full-stack","cloud","system","java","python","scala"].forEach(function(k){if(lower.indexOf(k)>-1)s.be++;});
  ["data","sql","analytics","analyst","bi","dbt","snowflake","looker","metric","dashboard","ml","spark","pandas"].forEach(function(k){if(lower.indexOf(k)>-1)s.da++;});
  ["product","pm","ops","operations","gpt","llm","prompt","agent","automation","builder","recruiter","hiring","marketing","sales","gtm","candidate","talent"].forEach(function(k){if(lower.indexOf(k)>-1)s.ai++;});
  if(profile.background==="builder"){s.fe+=1;s.be+=1;}
  if(profile.background==="data")s.da+=2;
  if(profile.background==="product")s.ai+=2;
  if(profile.background==="business")s.ai+=2;
  var max=Math.max(s.fe,s.be,s.da,s.ai);
  var key=(s.fe===max&&s.fe>0)?"fe":(s.be===max&&s.be>0)?"be":(s.da===max&&s.da>0)?"da":"ai";
  var strength=max>=4?"strong":max>=2?"good":"explore";
  var ROLES={
    fe:{title:"Software Engineer, Frontend",salary:"€60K–€150K",signals:["React/Next.js","TypeScript","UI ownership","User-facing product work"],tips:["React architecture decisions you've owned","Component library or design system work","Accessibility or performance optimization","Frame impact in user-facing terms"],link:"https://jobs.ashbyhq.com/dust/0e76888e-d271-485c-b72c-9d344b595f34"},
    be:{title:"Software Engineer",salary:"€40K–€150K",signals:["Full-stack/backend","TypeScript or Rust","Infrastructure","End-to-end ownership"],tips:["Features owned from API to production","Multi-language or infra work (Rust a bonus)","Open source contributions","System design trade-offs you've made"],link:"https://jobs.ashbyhq.com/dust/ec0ae613-e480-4d93-b89f-1d6a89db9766"},
    da:{title:"Product Data Analyst",salary:"€70K–€110K",signals:["Data/analytics background","SQL proficiency","Product-oriented metrics","Dashboard/tooling work"],tips:["How your data work influenced product decisions","Experimentation/A-B testing experience","Self-serve tooling for non-technical teams","Show impact, not just tools used"],link:"https://jobs.ashbyhq.com/dust/5426749b-1c1a-494b-932e-1299dbd4f883"},
    ai:{title:"AI Builder (Open Role)",salary:"Competitive",signals:["AI/product interest","Builder mindset","Automation or ops experience","Domain expertise"],tips:["Real AI projects — not buzzwords, actual builds","Agents or automation you've shipped","Why Dust specifically resonates","Initiative matters as much as background"],link:"https://jobs.ashbyhq.com/dust/11b8dbb0-6859-4826-b05c-083474483e1a"}
  };
  var role=ROLES[key];
  var cfg={strong:{bg:"bg-green-50",border:"border-green-200",badge:"bg-green-100 text-green-800",dot:"bg-green-500",label:"Strong Match"},good:{bg:"bg-blue-50",border:"border-blue-200",badge:"bg-blue-100 text-blue-800",dot:"bg-blue-500",label:"Good Match"},explore:{bg:"bg-amber-50",border:"border-amber-200",badge:"bg-amber-100 text-amber-800",dot:"bg-amber-500",label:"Worth Exploring"}}[strength];
  var signals=role.signals.map(function(s){return '<span class="bg-white border border-slate-200 text-slate-700 text-xs px-2 py-0.5 rounded-lg">&#10003; '+s+'</span>';}).join('');
  var tips=role.tips.map(function(t){return '<li class="text-xs text-slate-600 flex gap-2"><span class="text-slate-300 shrink-0 mt-0.5">&#8594;</span>'+t+'</li>';}).join('');
  var html='<div class="border rounded-2xl p-5 '+cfg.bg+' '+cfg.border+'"><div class="flex items-start justify-between gap-3 mb-4"><div><div class="text-sm font-bold text-slate-900">'+role.title+'</div><div class="text-xs text-slate-500 mt-0.5">&#128176; '+role.salary+' + equity &middot; &#128205; Paris</div></div><span class="text-xs font-semibold px-2.5 py-1.5 rounded-full flex items-center gap-1.5 shrink-0 '+cfg.badge+'"><span class="w-1.5 h-1.5 rounded-full '+cfg.dot+' inline-block"></span>'+cfg.label+'</span></div><div class="mb-4"><div class="text-xs font-semibold text-slate-600 mb-2">Detected from your profile:</div><div class="flex flex-wrap gap-1.5">'+signals+'</div></div><div class="mb-4"><div class="text-xs font-semibold text-slate-600 mb-2">What to highlight when you apply:</div><ul class="space-y-1.5">'+tips+'</ul></div><a href="'+role.link+'" target="_blank" class="block w-full bg-slate-900 text-white text-xs font-semibold py-3 rounded-xl text-center hover:bg-slate-700 transition-colors mb-2">Apply for this role &#8599;</a><button onclick="resetMatch()" class="w-full text-xs text-slate-400 py-1 hover:text-slate-600 transition-colors">Try a different profile</button></div>';
  var f=document.getElementById('match-form'),r=document.getElementById('match-result');
  if(f)f.style.display='none';
  if(r){r.style.display='block';r.innerHTML=html;}
}
function resetMatch(){
  var f=document.getElementById('match-form'),r=document.getElementById('match-result');
  if(f)f.style.display='block';if(r)r.style.display='none';
}

renderOnboarding(0);
</script>
