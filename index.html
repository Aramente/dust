var PROG = ["Welcome","Mission","Product","Team","Culture","Roles","Wrap-up"];
var tourStep = 0, tourDone = false, isTyping = false, lastTopic = null;

function updateProgress(){
  var bar = document.getElementById('progress');
  bar.innerHTML = PROG.map(function(l,i){
    var dot = i < tourStep ? '<span class="text-green-600 text-xs font-medium">✓</span>'
      : i === tourStep ? '<span class="text-slate-900 text-xs font-medium">'+(i+1)+'</span>'
      : '<span class="text-slate-300 text-xs font-medium">'+(i+1)+'</span>';
    var line = i < PROG.length-1 ? '<div class="w-3 h-px '+(i<tourStep?'bg-green-400':'bg-slate-200')+'"></div>' : '';
    return dot + line;
  }).join('') + '<span class="text-xs text-slate-400 ml-1">'+PROG[Math.min(tourStep,PROG.length-1)]+'</span>';
}

  if(role === 'guide'){
    var richHTML = richFn ? richFn() : '';
    var chipsHTML = chips ? '<div class="flex flex-wrap gap-1.5 mt-2">' + chips.map(function(c){
      return '<button onclick="chip(\'' + c.replace(/'/g,"\\'") + '\')" class="text-xs font-medium bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-full hover:border-slate-900 hover:text-slate-900 transition-all">'+c+'</button>';
    }).join('') + '</div>' : '';
    wrap.innerHTML = '<div class="flex items-start gap-2.5 max-w-lg">' +
      '<div class="w-7 h-7 bg-slate-900 rounded-full flex items-center justify-center shrink-0 mt-0.5"><span class="text-white text-xs font-bold">A</span></div>' +
      '<div><div class="bg-white border border-slate-100 rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-slate-700 leading-relaxed shadow-sm">' + text + richHTML + '</div>' + chipsHTML + '</div>' +
    '</div>';
  } else {
    wrap.innerHTML = '<div class="flex justify-end"><div class="bg-slate-900 text-white text-sm px-4 py-2.5 rounded-2xl rounded-tr-sm max-w-xs">'+text+'</div></div>';
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  var msgs = document.getElementById('msgs');
  var t = document.createElement('div');
  t.id = 'typing'; t.className = 'fadein flex items-start gap-2.5';
  t.innerHTML = '<div class="w-7 h-7 bg-slate-900 rounded-full flex items-center justify-center shrink-0"><span class="text-white text-xs font-bold">A</span></div>' +
    '<div class="bg-white border border-slate-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm"><div class="flex gap-1 items-center h-4">' +
    '<span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block bounce"></span>' +
    '<span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block bounce b2"></span>' +
    '<span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block bounce b3"></span>' +
    '</div></div>';
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping(){ var t=document.getElementById('typing'); if(t) t.remove(); }

function guide(text, richFn, chips, delay){
  isTyping = true; showTyping();
  setTimeout(function(){
    hideTyping(); isTyping = false;
    addMsg('guide', text, richFn, chips);
    updateProgress();
  }, delay || 950);
}

function isExtend(q){ return /extend|elaborate|develop|more about|tell me more|go deeper|detail|explain more|can you expand|more on|dig|deeper/.test(q.toLowerCase()); }

function findTopic(q){
  var lower = q.toLowerCase();
  for(var i=0; i<KB.length; i++){ if(KB[i].keys.some(function(k){return k.includes(' ') && lower.includes(k);})) return KB[i]; }
  for(var i=0; i<KB.length; i++){ if(KB[i].keys.some(function(k){return !k.includes(' ') && lower.includes(k);})) return KB[i]; }
  return null;
}

function respond(q){
  if(isExtend(q) && lastTopic){
    var deep = lastTopic.deep || lastTopic.text;
    guide(deep, null, !tourDone ? ["Continue the tour →","Another question"] : ["How do I apply?","Another question"]);
    return;
  }
  var topic = findTopic(q);
  if(topic){
    lastTopic = topic;
    guide(topic.text, topic.rich || null, !tourDone ? ["Tell me more about this","Continue the tour →"] : ["Tell me more about this","How do I apply?"]);
    return;
  }
  if(/hi|hello|hey|good/.test(q.toLowerCase())){ guide("Hey! 😊 Ask me anything — roles, culture, compensation, tech stack, the Back Market fraud system..."); return; }
  if(/thank/.test(q.toLowerCase())){ guide("Of course! Anything else you'd like to know about Dust?"); return; }
  guide("I want to give you a useful answer. Could you rephrase? You can ask about: <strong>the team</strong>, <strong>open roles</strong>, <strong>compensation</strong>, <strong>culture</strong>, <strong>tech stack</strong>, <strong>interview process</strong>, <strong>customer stories</strong>, or the <strong>Back Market fraud use case</strong>.", null, !tourDone ? ["Continue the tour →","Show me open roles"] : ["Show me open roles","How do I apply?"]);
}

function advanceTour(){
  var next = tourStep + 1;
  if(next < TOUR.length){
    tourStep = next;
    if(next === TOUR.length - 1) tourDone = true;
    guide(TOUR[next].msg, TOUR[next].rich || null, TOUR[next].chips, 650);
  }
}

function chip(c){
  addMsg('user', c, null, null);
  if(c === "Yes, let's go!"){ tourStep=1; guide(TOUR[1].msg, null, TOUR[1].chips, 700); return; }
  if(c === "Continue the tour →"){ advanceTour(); return; }
  if(c === "Tell me more about this"){ if(lastTopic && lastTopic.deep) guide(lastTopic.deep, null, !tourDone?["Continue the tour →","Another question"]:["How do I apply?","Another question"]); else advanceTour(); return; }
  if(c === "How does the product work?" || c === "Show me customer results"){ tourStep=2; guide(TOUR[2].msg, TOUR[2].rich||null, TOUR[2].chips); return; }
  if(c === "Tell me about the team" || c === "Show me the team"){ tourStep=3; guide(TOUR[3].msg, TOUR[3].rich||null, TOUR[3].chips); return; }
  if(c === "What's the culture?" || c === "What's the culture like?"){ tourStep=4; guide(TOUR[4].msg, TOUR[4].rich||null, TOUR[4].chips); return; }
  if(c === "What roles are open?" || c === "Show me open roles"){ tourStep=5; guide(TOUR[5].msg, TOUR[5].rich||null, TOUR[5].chips); return; }
  if(c === "How do I apply?"){
    if(!tourDone){ tourDone=true; tourStep=6; guide(TOUR[6].msg, null, TOUR[6].chips, 600); }
    setTimeout(function(){ guide("Head to <strong>jobs.ashbyhq.com/dust</strong> — starts with a 30-min intro call. We move fast and give real feedback at every step.", interviewSteps, null, 950); }, 200);
    return;
  }
  respond(c);
}

function send(){
  var inp = document.getElementById('inp');
  var q = inp.value.trim();
  if(!q || isTyping) return;
  inp.value = '';
  addMsg('user', q, null, null);
  if(/^(next|continue|go on|keep going)$/i.test(q)){ advanceTour(); return; }
  respond(q);
}

document.getElementById('inp').addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });

updateProgress();
addMsg('guide', TOUR[0].msg, null, TOUR[0].chips);
</script>
